<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Bitly Clone</title>

    <style>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {

            font-family: Arial, sans-serif;

            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(
                135deg,
                #667eea,
                #764ba2
            );
        }

        .container {

            width: 450px;

            padding: 40px;

            border-radius: 20px;

            background: rgba(255,255,255,0.15);

            backdrop-filter: blur(10px);

            box-shadow: 0 8px 32px rgba(0,0,0,0.2);

            text-align: center;

            color: white;
        }

        h1 {

            margin-bottom: 20px;

            font-size: 36px;
        }

        p {

            margin-bottom: 30px;

            color: #f1f1f1;
        }

        input {

            width: 100%;

            padding: 15px;

            border: none;

            border-radius: 10px;

            outline: none;

            margin-bottom: 20px;

            font-size: 16px;
        }

        button {

            width: 100%;

            padding: 15px;

            border: none;

            border-radius: 10px;

            background: #ffffff;

            color: #764ba2;

            font-size: 16px;

            font-weight: bold;

            cursor: pointer;

            transition: 0.3s;
        }

        button:hover {

            transform: scale(1.03);

            background: #f1f1f1;
        }

        .result {

            margin-top: 25px;

            padding: 15px;

            border-radius: 10px;

            background: rgba(255,255,255,0.2);
        }

        a {

            color: white;

            word-break: break-all;

            text-decoration: none;

            font-weight: bold;
        }

        .copy-btn {

            margin-top: 15px;

            background: #4CAF50;

            color: white;
        }

        .copy-btn:hover {

            background: #45a049;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>URL Shortener</h1>

        <p>Create short and powerful links instantly</p>

        <form method="POST">

            <input
                type="text"
                name="long_url"
                placeholder="Paste your long URL here..."
                required
            >

            <button type="submit">
                Shorten URL
            </button>

        </form>

        {% if short_url %}

        <div class="result">

            <h3>Short URL</h3>

            <br>

            <a
                href="{{ short_url }}"
                target="_blank"
                id="shortLink"
            >
                {{ short_url }}
            </a>

            <button
                class="copy-btn"
                onclick="copyLink()"
            >
                Copy Link
            </button>
            <br><br>

            <h3>QR Code</h3>

            <br>

            <img
                src="{{ qr_code }}"
                width="200"
            >
        </div>

        {% endif %}

    </div>

    <script>

        function copyLink() {

            const link =
                document.getElementById("shortLink").innerText;

            navigator.clipboard.writeText(link);

            alert("Copied to clipboard!");
        }

    </script>

</body>

</html>
